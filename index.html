<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Secret Message for You ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Kantumruy+Pro:wght@300;700&display=swap');

        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            font-family: 'Kantumruy Pro', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        .heart-particle {
            position: absolute;
            color: var(--gold);
            pointer-events: none;
            animation: floatUp 4s linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(212, 175, 55, 0.1);
            max-width: 450px;
            width: 90%;
            z-index: 10;
        }

        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            color: var(--gold);
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p { color: #ccc; font-size: 1.1rem; }

        .btn-group {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 25px;
            position: relative;
            height: 60px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: 0.4s;
        }

        #yesBtn { background: var(--gold); color: black; }
        #noBtn { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.2); position: absolute; }
        
        .hidden { display: none; }
        
        #photo-placeholder {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin: 0 auto 20px;
            background: url('https://i.pinimg.com/736x/8b/16/7a/8b167af653c2399dd93b952ad41191af.jpg') center/cover;
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <div id="start-overlay">
        <button class="btn" id="yesBtn" onclick="startExperience()" style="font-size: 1.5rem; padding: 20px 40px;">ចុចទីនេះដើម្បីបើកមើល ✨</button>
    </div>

    <video id="myVideo" style="display:none;">
        <source src="video/songtest.MP4" type="video/mp4">
    </video>

    <div class="card hidden" id="mainCard">
        <div id="intro">
            <div id="photo-placeholder"></div>
            <h1>Hey Gorgeous!</h1>
            <p>ខ្ញុំមានរឿងមួយចង់សួរអ្នកយូរហើយ... <br>តើអ្នកព្រមផ្តល់ឱកាសឱ្យយើងបានស្គាល់គ្នាទេ? ✨</p>
            <div class="btn-group">
                <button class="btn" id="yesBtn" onclick="celebrate()">ព្រមចា៎ ❤️</button>
                <button class="btn" id="noBtn" onmouseover="dodge()">ទេ</button>
            </div>
        </div>

        <div id="success" class="hidden">
            <h1 style="font-size: 4rem;">Yessss! 🎉</h1>
            <p>ចាំមើលក្នុង Telegram ណា! 🥰</p>
            <div style="font-size: 3rem; margin-top: 20px;">🏆👑🥂</div>
        </div>
    </div>

    <script>
        // បង្កើតបេះដូងហោះ
        function createHearts() {
            const container = document.getElementById('heart-container');
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
        setInterval(createHearts, 3000);

        const video = document.getElementById('myVideo');

        // នេះជា Function ដែលបាត់ (Fix Error)
        function startExperience() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('mainCard').classList.remove('hidden');
            
            video.currentTime = 201; // ចាប់ផ្ដើមនៅ 3:21
            video.play();

            video.ontimeupdate = function() {
                if(video.currentTime >= 219) { // ឈប់នៅ ១៨ វិនាទីក្រោយ
                    video.pause();
                }
            };
        }

        function dodge() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.position = 'fixed';
            
            if (video.paused) {
                video.currentTime = 201;
                video.play();
            }
        }

        function celebrate() {
            document.getElementById('intro').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
            for(let i=0; i<30; i++) { createHearts(); }
            document.body.style.background = "radial-gradient(circle at center, #2c1a05 0%, #050505 100%)";
            video.currentTime = 201;
            video.play();
        }
    </script>
</body>
</html>
