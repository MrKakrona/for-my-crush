    <head>

        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Kantumruy+Pro:wght@300;700&display=swap');
        :root { --gold: #D4AF37; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); font-family: 'Kantumruy Pro', sans-serif; overflow: hidden; color: white; }

    </head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Kantumruy+Pro:wght@300;700&display=swap');

        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            font-family: 'Kantumruy Pro', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* បង្កើតភាគល្អិតបេះដូងហោះ (Particles) */
        .heart-particle {
            position: absolute;
            color: var(--gold);
            pointer-events: none;
            animation: floatUp 4s linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Glassmorphism Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(212, 175, 55, 0.1);
            max-width: 450px;
            width: 90%;
            z-index: 10;
            transition: transform 0.5s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        h1 {
            color: var(--gold);
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        p {
            color: #ccc;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .btn-group {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 25px;
            position: relative;
            height: 60px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #yesBtn {
            background: linear-gradient(45deg, var(--gold), #f3cf7a);
            color: #000;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        #yesBtn:hover {
            transform: scale(1.15);
            box-shadow: 0 0 30px var(--gold);
        }

        #noBtn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            position: absolute;
        }

        /* Success Section */
        .hidden { display: none; }
        
        #photo-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin: 0 auto 20px;
            background: url('https://i.pinimg.com/736x/8b/16/7a/8b167af653c2399dd93b952ad41191af.jpg') center/cover;
            /* បងអាចដូរ Link រូបភាពខាងលើបាន */
        }
        /*Sound */
        

    </style>
</head>
<body>

    <div id="heart-container"></div>

    <div id="start-overlay">
        <button class="btn" id="yesBtn" onclick="startExperience()" style="font-size: 1.5rem; padding: 20px 40px;">ចុចទីនេះដើម្បីបើកមើល ✨</button>
    </div>

    <div id="player" style="display:none;"></div>


    <div class="card" id="mainCard">
        <div id="intro">
            <div id="photo-placeholder"></div>
            <h1>Hey Gorgeous!</h1>
            <p>ខ្ញុំមានរឿងមួយចង់សួរអ្នកយូរហើយ... <br>តើអ្នកព្រមផ្តល់ឱកាសឱ្យយើងបានស្គាល់គ្នាលើសពីមិត្តភក្តិទេ? ✨</p>
            
            <div class="btn-group">
                <button class="btn" id="yesBtn" onclick="celebrate()">ព្រមចា៎ ❤️</button>
                <button class="btn" id="noBtn" onmouseover="dodge()">ទេ</button>
            </div>
        </div>

        <div id="success" class="hidden">
            <h1 style="font-size: 4rem;">Yessss! 🎉</h1>
            <p>អ្នកធ្វើឱ្យថ្ងៃនេះក្លាយជាថ្ងៃដែលពិសេសបំផុតសម្រាប់ខ្ញុំ។ <br>ចាំមើលក្នុង Telegram ណា ខ្ញុំនឹងផ្ញើសារទៅឥឡូវហើយ! 🥰</p>
            <div style="font-size: 3rem; margin-top: 20px;">🏆👑🥂</div>
        </div>
    </div>
        <div id="player" style="display:none;"></div>

    <script>

var player;
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'mE7R7XzN3pM', 
                playerVars: { 'start': 201, 'controls': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                setInterval(function() {
                    if (player.getCurrentTime() >= 219) { player.stopVideo(); }
                }, 1000);
            }
        }

        // ចុចប៊ូតុងដំបូងដើម្បីឱ្យសំឡេងដើរ
        function startExperience() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('mainCard').classList.remove('hidden');
            if(player) {
                player.playVideo();
                player.mute(); // Mute សិនដើម្បីឱ្យវាដើរជួប Browser policy
                setTimeout(() => { player.unMute(); }, 500); // រួចបើកសំឡេងវិញ
            }
        }

        function celebrate() {
            document.getElementById('intro').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
            if(player) { player.playVideo(); player.unMute(); }
        }
     

    
    function dodge() {
        if(player) player.playVideo(); // លេងពេលគាត់ព្យាយាមចុច No
        // ... កូដសម្រាប់ប៊ូតុងរត់គេចរបស់អ្នក ...
    }

    function celebrate() {
        if(player) player.playVideo(); // លេងពេលគាត់ចុច Yes
        // ... កូដសម្រាប់ផ្ទាំងជោគជ័យរបស់អ្នក ...
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('success').classList.remove('hidden');
    }


        // បង្កើតបេះដូងហោះ
        function createHearts() {
            const container = document.getElementById('heart-container');
            const heartIcons = ['❤️', '✨', '💖', '⭐', '🌸'];
            
            for(let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-particle';
                    heart.innerHTML = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    container.appendChild(heart);
                    
                    // លុបវាចោលវិញពេលចប់ animation
                    setTimeout(() => heart.remove(), 4000);
                }, i * 300);
            }
        }
        setInterval(createHearts, 3000);

        // មុខងារប៊ូតុងរត់គេច
        function dodge() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.position = 'fixed';
        }

        // មុខងារពេលចុច Yes
        function celebrate() {
            document.getElementById('intro').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
            
            // បន្ថែម Effect ផ្ទុះបេះដូង
            for(let i=0; i<50; i++) { createHearts(); }
            
            // ប្តូរពណ៌ Background ឱ្យកាន់តែរ៉ូមែនទិក
            document.body.style.background = "radial-gradient(circle at center, #2c1a05 0%, #050505 100%)";
        }
    </script>
</body>
</html>
